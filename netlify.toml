[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[dev]
  command   = "npm run dev"
  port      = 5173
  targetPort = 5173

# API routes → Netlify Functions
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# SPA fallback (must be last)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
