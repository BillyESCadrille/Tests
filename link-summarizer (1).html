<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synthèse</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f5f7;
  --surface: rgba(255,255,255,0.82);
  --surface-solid: #ffffff;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.13);
  --accent: #0071e3;
  --accent-hover: #0077ed;
  --accent-light: rgba(0,113,227,0.08);
  --text: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-tertiary: #aeaeb2;
  --error: #ff3b30;
  --success: #34c759;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.09), 0 2px 8px rgba(0,0,0,0.04);
  --radius: 18px;
  --radius-sm: 12px;
  --radius-xs: 8px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 72px 20px 80px;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(0,113,227,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(88,86,214,0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

body > * { position: relative; z-index: 1; }

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 40px;
  animation: fadeUp 0.6s ease both;
}

.header-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 5px 14px;
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--accent);
  margin-bottom: 18px;
  box-shadow: var(--shadow-sm);
  backdrop-filter: blur(12px);
}

.header-eyebrow::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
}

.header h1 {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: clamp(2.4rem, 6vw, 4rem);
  font-weight: 400;
  letter-spacing: -0.03em;
  line-height: 1.05;
  color: var(--text);
  margin-bottom: 10px;
}

.header h1 em {
  font-style: italic;
  color: var(--accent);
}

.header p {
  font-size: 0.9rem;
  color: var(--text-secondary);
}

/* MAIN CARD */
.main-card {
  width: 100%;
  max-width: 680px;
  background: var(--surface);
  backdrop-filter: blur(20px) saturate(1.8);
  -webkit-backdrop-filter: blur(20px) saturate(1.8);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow-lg);
  margin-bottom: 16px;
  animation: fadeUp 0.6s 0.1s ease both;
}

/* INPUT */
.input-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg);
  border: 1.5px solid var(--border-strong);
  border-radius: 14px;
  padding: 6px 6px 6px 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
}

.input-icon {
  color: var(--text-tertiary);
  flex-shrink: 0;
}

.url-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'Geist', sans-serif;
  font-size: 0.9rem;
  color: var(--text);
  min-width: 0;
}

.url-input::placeholder { color: var(--text-tertiary); }

.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 11px 20px;
  font-family: 'Geist', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
  box-shadow: 0 1px 3px rgba(0,113,227,0.3);
  flex-shrink: 0;
}

.btn-primary:hover { background: var(--accent-hover); box-shadow: 0 2px 8px rgba(0,113,227,0.35); }
.btn-primary:active { transform: scale(0.97); }
.btn-primary:disabled { background: var(--text-tertiary); box-shadow: none; cursor: not-allowed; transform: none; }

/* SEGMENTED CONTROLS */
.controls-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 16px;
  gap: 12px;
  flex-wrap: wrap;
}

.control-group {
  display: flex;
  align-items: center;
  gap: 8px;
}

.control-label {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-tertiary);
}

.segmented {
  display: flex;
  background: rgba(0,0,0,0.05);
  border-radius: 9px;
  padding: 2px;
  gap: 1px;
}

.seg-btn {
  background: transparent;
  border: none;
  border-radius: 7px;
  padding: 5px 12px;
  font-family: 'Geist', sans-serif;
  font-size: 0.76rem;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.seg-btn.active {
  background: var(--surface-solid);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

/* RESULT */
.result-card {
  width: 100%;
  max-width: 680px;
  display: none;
  animation: fadeUp 0.4s ease both;
}

.result-card.visible { display: block; }

.result-inner {
  background: var(--surface);
  backdrop-filter: blur(20px) saturate(1.8);
  -webkit-backdrop-filter: blur(20px) saturate(1.8);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}

.result-topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.5);
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,0,0,0.04);
  border-radius: 100px;
  padding: 4px 10px;
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--text-secondary);
  flex-shrink: 0;
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-tertiary);
  transition: background 0.3s;
}

.status-dot.loading { background: var(--accent); animation: breathe 1.2s ease-in-out infinite; }
.status-dot.done { background: var(--success); }
.status-dot.error { background: var(--error); }

@keyframes breathe {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

.result-url-text {
  font-size: 0.75rem;
  color: var(--text-tertiary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}

.result-body {
  padding: 28px 28px 24px;
  min-height: 100px;
}

.loading-state {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-secondary);
  font-size: 0.85rem;
}

.loading-spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border-strong);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

.summary-title {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 1.45rem;
  font-weight: 400;
  line-height: 1.3;
  color: var(--text);
  margin-bottom: 14px;
  letter-spacing: -0.02em;
}

.summary-tldr {
  font-size: 0.875rem;
  line-height: 1.75;
  color: var(--text-secondary);
  margin-bottom: 20px;
  padding: 14px 16px;
  background: var(--accent-light);
  border-radius: var(--radius-xs);
  border-left: 3px solid var(--accent);
}

.summary-points-label {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-tertiary);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.summary-points {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.summary-points li {
  font-size: 0.86rem;
  line-height: 1.65;
  color: var(--text-secondary);
  padding: 10px 12px 10px 14px;
  border-radius: var(--radius-xs);
  display: flex;
  align-items: flex-start;
  gap: 10px;
  transition: background 0.15s;
}

.summary-points li:hover { background: rgba(0,0,0,0.025); }

.point-icon {
  width: 18px; height: 18px;
  background: var(--accent-light);
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.point-icon::after {
  content: '';
  width: 5px; height: 5px;
  background: var(--accent);
  border-radius: 50%;
}

.error-msg {
  color: var(--error);
  font-size: 0.85rem;
  line-height: 1.6;
}

/* NOTION FOOTER */
.result-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  background: rgba(0,0,0,0.015);
}

.result-footer-hint {
  font-size: 0.75rem;
  color: var(--text-tertiary);
}

.btn-notion {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--surface-solid);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-xs);
  padding: 8px 14px;
  font-family: 'Geist', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: var(--shadow-sm);
}

.btn-notion:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.08); }
.btn-notion:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
.btn-notion.saved { background: rgba(52,199,89,0.08); border-color: rgba(52,199,89,0.3); color: var(--success); }

/* HISTORY */
.history-section {
  width: 100%;
  max-width: 680px;
  margin-top: 32px;
  animation: fadeUp 0.4s ease both;
}

.history-header {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 10px;
  padding: 0 4px;
}

.history-list {
  background: var(--surface);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.history-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  cursor: pointer;
  transition: background 0.15s;
  border-bottom: 1px solid var(--border);
}

.history-item:last-child { border-bottom: none; }
.history-item:hover { background: rgba(0,0,0,0.025); }

.history-favicon {
  width: 28px; height: 28px;
  background: var(--bg);
  border-radius: 7px;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  color: var(--text-secondary);
  flex-shrink: 0;
  font-weight: 600;
}

.history-text { flex: 1; min-width: 0; }

.history-title {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.history-url {
  font-size: 0.72rem;
  color: var(--text-tertiary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-top: 1px;
}

/* ANIMATIONS */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Propulsé par Claude</div>
  <h1>Résumé <em>intelligent</em></h1>
  <p>Colle une URL et reçois l'essentiel en secondes</p>
</div>

<div class="main-card">
  <div class="input-wrap">
    <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="6.5" cy="6.5" r="5"/><path d="M14.5 14.5l-3.5-3.5"/>
    </svg>
    <input type="url" class="url-input" id="urlInput" placeholder="Colle une URL ici…" autocomplete="off" />
    <button class="btn-primary" id="summarizeBtn" onclick="summarize()">Résumer</button>
  </div>

  <div class="controls-row">
    <div class="control-group">
      <span class="control-label">Style</span>
      <div class="segmented">
        <button class="seg-btn" onclick="setStyle(this,'bullets')">Points</button>
        <button class="seg-btn active" onclick="setStyle(this,'structured')">Structuré</button>
        <button class="seg-btn" onclick="setStyle(this,'detailed')">Détaillé</button>
      </div>
    </div>
    <div class="control-group">
      <span class="control-label">Langue</span>
      <div class="segmented">
        <button class="seg-btn active" onclick="setLang(this,'fr')">🇫🇷 FR</button>
        <button class="seg-btn" onclick="setLang(this,'same')">Auto</button>
      </div>
    </div>
  </div>
</div>

<div class="result-card" id="resultCard">
  <div class="result-inner">
    <div class="result-topbar">
      <div class="status-pill">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Analyse…</span>
      </div>
      <div class="result-url-text" id="resultUrlText"></div>
    </div>
    <div class="result-body" id="resultBody">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        Lecture de l'article…
      </div>
    </div>
    <div class="result-footer" id="resultFooter" style="display:none">
      <span class="result-footer-hint">Sauvegarder ce résumé</span>
      <button class="btn-notion" id="notionBtn" onclick="saveToNotion()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M4.459 4.208c.746.606 1.026.56 2.428.466l13.215-.793c.28 0 .047-.28-.046-.326L17.86 1.968c-.42-.326-.981-.7-2.055-.607L3.01 2.295c-.466.046-.56.28-.374.466zm.793 3.08v13.904c0 .747.373 1.027 1.214.98l14.523-.84c.841-.046.935-.56.935-1.167V6.354c0-.606-.233-.933-.748-.887l-15.177.887c-.56.047-.747.327-.747.933zm14.337.745c.093.42 0 .84-.42.888l-.7.14v10.264c-.608.327-1.168.514-1.635.514-.748 0-.935-.234-1.495-.933l-4.577-7.186v6.952L12.21 19s0 .84-1.168.84l-3.222.186c-.093-.186 0-.653.327-.746l.84-.233V9.854L7.822 9.76c-.094-.42.14-1.026.793-1.073l3.456-.233 4.764 7.279v-6.44l-1.215-.139c-.093-.514.28-.887.747-.933zM1.936 1.035l13.31-.98c1.634-.14 2.055-.047 3.082.7l4.249 2.986c.7.513.934.653.934 1.213v16.378c0 1.026-.373 1.634-1.68 1.726l-15.458.934c-.98.047-1.448-.093-1.962-.747l-3.129-4.06c-.56-.747-.793-1.306-.793-1.96V2.667c0-.839.374-1.54 1.447-1.632z"/></svg>
        Sauvegarder dans Notion
      </button>
    </div>
  </div>
</div>

<div class="history-section" id="historySection" style="display:none">
  <div class="history-header">Récents</div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
let currentStyle = 'structured';
let currentLang = 'fr';
let history = [];
let currentSummary = null;
let currentUrl = null;

const NOTION_PAGE_ID = '31fc3498-6489-8168-80ad-ea3965961600';

function setStyle(btn, val) {
  btn.closest('.segmented').querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentStyle = val;
}

function setLang(btn, val) {
  btn.closest('.segmented').querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentLang = val;
}

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') summarize();
});

function buildPrompt(url) {
  const langInstruction = currentLang === 'fr'
    ? 'Réponds OBLIGATOIREMENT en français.'
    : "Réponds dans la même langue que l'article.";
  const styleInstructions = {
    bullets: `Génère un JSON strict: {"title":"titre","points":["point 1","point 2","point 3","point 4","point 5"]} — max 5 points, 1-2 phrases chacun.`,
    structured: `Génère un JSON strict: {"title":"titre","tldr":"résumé 2-3 phrases","points":["point clé 1","point clé 2","point clé 3"]}`,
    detailed: `Génère un JSON strict: {"title":"titre","tldr":"résumé détaillé 4-6 phrases","points":[]}`
  };
  return `Tu es un assistant de synthèse. ${langInstruction}
Résume cet article : ${url}
Utilise web_search pour lire le contenu.
${styleInstructions[currentStyle]}
Réponds UNIQUEMENT avec le JSON brut, sans markdown ni explication.`;
}

function renderSummary(data) {
  let html = '';
  if (data.title) html += `<div class="summary-title">${data.title}</div>`;
  if (data.tldr) html += `<div class="summary-tldr">${data.tldr}</div>`;
  if (data.points?.length) {
    html += `<div class="summary-points-label">Points clés</div><ul class="summary-points">`;
    data.points.forEach(p => { html += `<li><div class="point-icon"></div><span>${p}</span></li>`; });
    html += `</ul>`;
  }
  return html || '<span class="error-msg">Impossible de générer le résumé.</span>';
}

async function summarize() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;

  const btn = document.getElementById('summarizeBtn');
  const resultCard = document.getElementById('resultCard');
  const resultBody = document.getElementById('resultBody');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  btn.disabled = true;
  resultCard.classList.add('visible');
  document.getElementById('resultUrlText').textContent = url;
  document.getElementById('resultFooter').style.display = 'none';
  statusDot.className = 'status-dot loading';
  statusText.textContent = 'Lecture…';
  resultBody.innerHTML = `<div class="loading-state"><div class="loading-spinner"></div>Lecture de l'article…</div>`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: buildPrompt(url) }]
      })
    });

    const data = await response.json();
    const fullText = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
    const jsonMatch = fullText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error("Format de réponse inattendu");

    const summary = JSON.parse(jsonMatch[0]);
    statusDot.className = 'status-dot done';
    statusText.textContent = 'Résumé prêt';
    resultBody.innerHTML = renderSummary(summary);

    currentSummary = summary;
    currentUrl = url;

    const footer = document.getElementById('resultFooter');
    const notionBtn = document.getElementById('notionBtn');
    footer.style.display = 'flex';
    notionBtn.disabled = false;
    notionBtn.classList.remove('saved');
    notionBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M4.459 4.208c.746.606 1.026.56 2.428.466l13.215-.793c.28 0 .047-.28-.046-.326L17.86 1.968c-.42-.326-.981-.7-2.055-.607L3.01 2.295c-.466.046-.56.28-.374.466zm.793 3.08v13.904c0 .747.373 1.027 1.214.98l14.523-.84c.841-.046.935-.56.935-1.167V6.354c0-.606-.233-.933-.748-.887l-15.177.887c-.56.047-.747.327-.747.933zm14.337.745c.093.42 0 .84-.42.888l-.7.14v10.264c-.608.327-1.168.514-1.635.514-.748 0-.935-.234-1.495-.933l-4.577-7.186v6.952L12.21 19s0 .84-1.168.84l-3.222.186c-.093-.186 0-.653.327-.746l.84-.233V9.854L7.822 9.76c-.094-.42.14-1.026.793-1.073l3.456-.233 4.764 7.279v-6.44l-1.215-.139c-.093-.514.28-.887.747-.933zM1.936 1.035l13.31-.98c1.634-.14 2.055-.047 3.082.7l4.249 2.986c.7.513.934.653.934 1.213v16.378c0 1.026-.373 1.634-1.68 1.726l-15.458.934c-.98.047-1.448-.093-1.962-.747l-3.129-4.06c-.56-.747-.793-1.306-.793-1.96V2.667c0-.839.374-1.54 1.447-1.632z"/></svg> Sauvegarder dans Notion`;

    history.unshift({ url, title: summary.title || url });
    renderHistory();

  } catch (err) {
    statusDot.className = 'status-dot error';
    statusText.textContent = 'Erreur';
    resultBody.innerHTML = `<div class="error-msg">⚠️ ${err.message} — Vérifie que l'URL est valide et réessaie.</div>`;
  } finally {
    btn.disabled = false;
  }
}

async function saveToNotion() {
  if (!currentSummary) return;
  const btn = document.getElementById('notionBtn');
  btn.disabled = true;
  btn.innerHTML = `<div class="loading-spinner" style="width:12px;height:12px;border-width:1.5px;margin:0"></div> Sauvegarde…`;

  try {
    const date = new Date().toLocaleDateString('fr-FR');
    const points = (currentSummary.points || []).map(p => `- ${p}`).join('\n');
    const content = `## ${currentSummary.title || 'Sans titre'}\n\n**Source :** ${currentUrl}\n**Date :** ${date}\n\n${currentSummary.tldr ? `> ${currentSummary.tldr}\n\n` : ''}${points ? `### Points clés\n\n${points}` : ''}`;

    await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        mcp_servers: [{ type: "url", url: "https://mcp.notion.com/mcp", name: "notion" }],
        messages: [{
          role: "user",
          content: `Crée une page Notion sous le parent ID "${NOTION_PAGE_ID}" avec le titre "${currentSummary.title || currentUrl}" et ce contenu:\n${content}\nRéponds "OK".`
        }]
      })
    });

    btn.innerHTML = `✓ Sauvegardé`;
    btn.classList.add('saved');
  } catch (err) {
    btn.disabled = false;
    btn.innerHTML = `✗ Réessayer`;
  }
}

function getDomain(url) {
  try { return new URL(url).hostname.replace('www.', '').slice(0, 2).toUpperCase(); }
  catch { return '•'; }
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if (!history.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = history.map(h => `
    <div class="history-item" onclick="document.getElementById('urlInput').value='${h.url.replace(/'/g,"\\'")}'; document.getElementById('urlInput').focus()">
      <div class="history-favicon">${getDomain(h.url)}</div>
      <div class="history-text">
        <div class="history-title">${h.title}</div>
        <div class="history-url">${h.url}</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text-tertiary);flex-shrink:0"><path d="M6 4l4 4-4 4"/></svg>
    </div>`).join('');
}
</script>
